name: Crypto News Bot

# Runs automatically on a schedule, and can be triggered manually from the Actions tab.
on:
  schedule:
    # Every 5 minutes (GitHub's fastest free option). Note: runs can still be
    # delayed a few minutes at busy times — normal for free scheduled jobs.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Allow the job to commit the updated seen.json back to the repo.
permissions:
  contents: write

# Never run two copies at once.
concurrency:
  group: news-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Save which articles were sent
        continue-on-error: true   # never fail the run over bookkeeping
        run: |
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git config user.name "news-bot"
            git config user.email "news-bot@users.noreply.github.com"
            git add seen.json
            git commit -m "Update seen articles [skip ci]"
            # Pull the latest main (in case a prior run pushed), then push. Retry a few times.
            for i in 1 2 3 4 5; do
              git pull --rebase -X ours origin "${GITHUB_REF_NAME}" || git rebase --abort || true
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then
                echo "pushed"; break
              fi
              echo "push rejected, retrying..."; sleep 3
            done
          else
            echo "No changes to seen.json"
          fi
